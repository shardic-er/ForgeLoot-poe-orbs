name: forge-loot-poe-orbs
version: 0.2.0
description: >
  PoE-style currency orb crafting system for ForgeLoot items.
  Orbs modify forge items: upgrade rarity, reroll affixes, transmog,
  rename, level adjustment, duplication, and more.
depends:
  - forge-loot
  - qol-tweaks
tokens:
  # --- Original orb item entries ---
  - ITEM_ORB_ALTERATION
  - ITEM_ORB_TRANSMUTATION
  - ITEM_ORB_REGAL
  - ITEM_ORB_EXALTED
  - ITEM_ORB_ALCHEMY
  - ITEM_ORB_SCOURING          # Renamed to Orb of Annulment (keeps token)
  - ITEM_ORB_CHAOS
  - ITEM_ORB_DIVINE             # Renamed to Blessed Orb (keeps token)
  # --- New orb item entries ---
  - ITEM_ORB_FULLSCOUR           # New Orb of Scouring (full reset)
  - ITEM_ORB_WHETSTONE           # Blacksmith's Whetstone
  - ITEM_ORB_ARMORER             # Armorer's Scrap
  - ITEM_ORB_MIRROR              # Mirror of Kalandra
  - ITEM_ORB_ANCIENT             # Ancient Orb
  - ITEM_ORB_TRANSMOG            # Divine Orb (transmog)
  - ITEM_ORB_IDENTIFY            # Scroll of Identification
  - ITEM_PORTAL_SCROLL           # Portal Scroll
  - ITEM_ORB_AWAKENER            # Awakener's Orb
  - ITEM_ORB_INFLUENCED          # Influenced Exalted Orb
  - ITEM_ORB_JEWELER             # Jeweler's Orb
  - ITEM_ORB_VAAL                # Vaal Orb
  - ITEM_ORB_CRATE               # Smithing Orb Crate (24-slot engineering bag)

